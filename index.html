<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPBLPB ONLINE HUB - पीलीबंगा ई-मित्र केंद्र</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --primary: #0f172a; /* प्रीमियम डार्क ब्लू */
            --accent: #ff9100;  /* चमकीला ऑरेंज */
            --bg-light: #f8fafc;
            --success: #10b981; /* आधुनिक हरा */
            --danger: #ef4444;  /* आधुनिक लाल */
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-light); color: #1e293b; }

        /* TOP EMERGENCY CONTACT BANNER */
        .top-banner { background: linear-gradient(90deg, #ef4444, #cc0000); color: white; padding: 12px; text-align: center; font-size: 1.3rem; font-weight: bold; border-bottom: 3px solid var(--accent); }
        .top-banner a { color: #fff; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
        .top-banner i { color: #facc15; animation: bounce 1s infinite alternate; }

        @keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-3px); } }

        /* Modern Main Header */
        header { background: linear-gradient(135deg, #1e293b, #0f172a); color: white; padding: 35px 20px; text-align: center; position: relative; border-bottom: 5px solid var(--accent); }
        header h1 { font-size: 3.2rem; font-weight: 800; letter-spacing: 1px; background: linear-gradient(to right, #fff, #ffe082); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 4px 12px rgba(0,0,0,0.3); }
        header p { color: #94a3b8; font-size: 1.2rem; margin-top: 8px; font-weight: 500; }

        /* Luxury Navigation Menu */
        nav { background-color: #020617; display: flex; justify-content: center; flex-wrap: wrap; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        nav a { color: #cbd5e1; padding: 16px 24px; text-decoration: none; font-weight: 700; font-size: 0.95rem; text-transform: uppercase; transition: all 0.3s ease; border-bottom: 3px solid transparent; }
        nav a:hover { color: #fff; background-color: rgba(255,145,0,0.1); border-bottom: 3px solid var(--accent); }

        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }

        /* PREMIUM HEADLINE DESIGN */
        .section-headline { 
            background: linear-gradient(135deg, #1e293b, #334155); 
            color: white; 
            padding: 15px 25px; 
            font-size: 1.5rem; 
            font-weight: 700; 
            border-radius: 8px 8px 0 0;
            border-left: 6px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Filter Section Body */
        .filter-section { background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .filter-body { padding: 25px; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .filter-btn { background: #f1f5f9; color: #0f172a; padding: 14px; text-align: center; text-decoration: none; font-weight: 700; border-radius: 6px; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .filter-btn:hover { background: var(--primary); color: white; transform: translateY(-3px); box-shadow: 0 4px 12px rgba(15,23,42,0.15); }

        /* 3 Column Grid for Jobs */
        .job-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .box { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; transition: all 0.3s; }
        .box:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        
        .box-title { color: white; padding: 15px; font-size: 1.25rem; font-weight: 700; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .bg-result { background: linear-gradient(135deg, #ef4444, #b91c1c); }
        .bg-admit { background: linear-gradient(135deg, #10b981, #047857); }
        .bg-key { background: linear-gradient(135deg, #f59e0b, #b45309); }

        .link-list { list-style: none; }
        .link-list li { border-bottom: 1px solid #f1f5f9; padding: 14px 20px; transition: all 0.2s; }
        .link-list li:hover { background-color: #f8fafc; }
        .link-list li a { color: #334155; text-decoration: none; font-weight: 600; display: block; font-size: 0.95rem; }
        
        .blink-tag { background: linear-gradient(to right, #ef4444, #ff3d00); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; animation: blink 0.8s infinite; float: right; box-shadow: 0 2px 4px rgba(239,68,68,0.3); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* 📥 डाउनलोड सेंटर सेक्शन स्टाइल */
        .download-card { background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 40px; overflow: hidden; }
        .download-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 25px; }
        .download-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .download-item:hover { background: #edf2f7; transform: translateX(3px); border-left: 4px solid #3182ce; }
        .download-info { display: flex; align-items: center; gap: 12px; }
        .download-info i { font-size: 1.5rem; color: #e53e3e; } 
        .download-info span { font-weight: 600; color: #2d3748; font-size: 0.95rem; }
        .dl-btn { background: #3182ce; color: white; padding: 6px 12px; text-decoration: none; border-radius: 4px; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .dl-btn:hover { background: #2b6cb0; }

        /* All Services List Card */
        .services-card { background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 40px; overflow: hidden; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; padding: 30px; }
        .service-column h4 { margin-bottom: 15px; font-size: 1.2rem; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; font-weight: 700; color: #1e293b; }
        .service-column ul { list-style: none; line-height: 2.4; color: #475569; }
        .service-column ul li i { color: var(--accent); margin-right: 8px; }

        /* TRIPLE SECTION BOTTOM LAYOUT */
        .bottom-action-layout { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 25px; margin-top: 30px; }

        @media (max-width: 1050px) { .bottom-action-layout { grid-template-columns: 1fr; } }

        /* Elegant Form */
        .form-section { background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        .form-body { padding: 25px; }
        .form-headline { background: linear-gradient(90deg, #047857, #10b981); color: white; padding: 15px 25px; font-size: 1.4rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.95rem; color: #334155; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; background-color: #f8fafc; }
        
        /* Owner Card Custom */
        .owner-card { background: white; border-radius: 8px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; height: max-content; }
        .owner-headline { background: linear-gradient(90deg, #1e293b, #475569); color: white; padding: 15px; font-size: 1.25rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .owner-body { padding: 25px; }
        .owner-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid #f1f5f9; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 15px; }
        .owner-name { font-size: 1.4rem; font-weight: bold; color: #0f172a; margin-bottom: 4px; }
        .owner-title { font-size: 0.85rem; color: #64748b; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .owner-btn { display: inline-flex; align-items: center; gap: 8px; background: #0f172a; color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        /* QR Card Custom */
        .qr-card { background: white; border-radius: 8px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; height: max-content; }
        .qr-headline { background: linear-gradient(90deg, #d97706, #f59e0b); color: white; padding: 15px; font-size: 1.25rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .qr-body { padding: 25px; }
        .qr-card img { background: white; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; width: 160px; height: 160px; }
        .qr-text { font-size: 0.85rem; font-weight: 700; margin-top: 15px; color: #475569; }

        footer { background-color: #0f172a; color: #94a3b8; text-align: center; padding: 25px; font-size: 0.95rem; margin-top: 40px; border-top: 4px solid var(--accent); }
    </style>
