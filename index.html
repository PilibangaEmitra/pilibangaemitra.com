<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kpbplb Online Hub - सरकारी नौकरियां एवं ई-मित्र सेवाएं</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f6f9; color: #222; }

        /* Top Header & Branding */
        header { background: linear-gradient(135deg, #0d47a1, #1565c0); color: white; padding: 20px; text-align: center; border-bottom: 4px solid #ff9800; position: relative; }
        header h1 { font-size: 2.8rem; font-weight: bold; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header p { color: #ffe082; font-size: 1.2rem; font-weight: 600; margin-top: 5px; }
        .top-contact { position: absolute; top: 15px; right: 20px; color: white; font-weight: bold; font-size: 1rem; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 4px; }

        /* Navigation Menu From Notes */
        nav { background-color: #1a1a1a; display: flex; justify-content: center; flex-wrap: wrap; border-bottom: 2px solid #ff9800; }
        nav a { color: white; padding: 14px 20px; text-decoration: none; font-weight: bold; font-size: 0.95rem; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { background-color: #ff9800; color: black; }

        .container { max-width: 1250px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        /* WhatsApp Interactive Request Form */
        .form-section { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid #25d366; }
        .form-section h2 { color: #128c7e; margin-bottom: 15px; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.95rem; color: #444; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #25d366; outline: none; }
        
        .submit-btn { background-color: #25d366; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 4px; font-size: 1.1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .submit-btn:hover { background-color: #128c7e; }

        /* Sidebar - QR Code Card */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .qr-card { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid #ff9800; }
        .qr-card h3 { font-size: 1.1rem; margin-bottom: 12px; color: #333; }
        .qr-card img { background: white; padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 160px; height: 160px; object-fit: contain; }
        .qr-text { font-size: 0.85rem; font-weight: bold; margin-top: 8px; color: #666; }

        /* Full Width Elements Wrapper */
        .full-width { grid-column: 1 / -1; }

        /* Latest Form Categories Grid */
        .filter-section { background: white; padding: 15px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin: 15px 0 25px 0; border-left: 5px solid #0d47a1; }
        .filter-title { font-weight: bold; margin-bottom: 10px; color: #0d47a1; font-size: 1.1rem; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .filter-btn { background: #e3f2fd; color: #0d47a1; padding: 10px; text-align: center; text-decoration: none; font-weight: 600; border-radius: 4px; transition: 0.2s; border: 1px solid #bbdefb; }
        .filter-btn:hover { background: #0d47a1; color: white; }

        /* Master Grid for Services Information */
        .services-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 4px solid #0d47a1; }
        .services-main-title { color: #0d47a1; margin-bottom: 20px; font-size: 1.6rem; border-bottom: 2px solid #ff9800; padding-bottom: 5px; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; }
        .service-column h4 { margin-bottom: 12px; font-size: 1.15rem; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
        .service-column ul { list-style: none; line-height: 2; color: #444; font-size: 0.95rem; }
        .service-column ul li i { color: #ff9800; margin-right: 6px; font-size: 0.85rem; }

        /* 3 Column Grid for Job Alerts */
        .job-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
        .box { background: white; border-radius: 6px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .box-title { color: white; padding: 12px; font-size: 1.2rem; font-weight: bold; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .bg-result { background-color: #d32f2f; }
        .bg-admit { background-color: #2e7d32; }
        .bg-key { background-color: #f57c00; }

        .link-list { list-style: none; }
        .link-list li { border-bottom: 1px solid #f0f0f0; padding: 12px 15px; }
        .link-list li:nth-child(even) { background-color: #fafafa; }
        .link-list li a { color: #333; text-decoration: none; font-weight: 600; display: block; }
        .link-list li a:hover { color: #0d47a1; text-decoration: underline; }
        
        .blink-tag { background-color: #ff3d00; color: white; padding: 2px 6px; border-radius: 3px; font-size: 0.75rem; font-weight: bold; animation: blink 1s infinite; float: right; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Address & Contact Footer Details */
        .info-footer { background-color: #212121; color: #ccc; padding: 30px 20px; border-top: 4px solid #0d47a1; margin-top: 40px; }
        .info-container { max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 20px; }
        .info-block { flex: 1; min-width: 280px; }
        .info-block h3 { color: white; margin-bottom: 15px; font-size: 1.2rem; border-bottom: 2px solid #ff9800; padding-bottom: 5px; display: inline-block; }
        .info-block p { line-height: 1.6; margin-bottom: 8px; font-size: 0.95rem; }
        .info-block i { color: #ff9800; margin-right: 8px; }

        .copyright { text-align: center; background-color: #1a1a1a; color: #888; padding: 15px; font-size: 0.85rem; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <!-- Header Branding -->
    <header>
        <h1>KPBLPB ONLINE HUB</h1>
        <p>ऑल इंडिया गवर्नमेंट जॉब्स एवं डिजिटल ई-मित्र सर्विसेज</p>
        <div class="top-contact"><i class="fa-solid fa-phone"></i> 8955502010</div>
    </header>

    <!-- Navigation Menu From Notes -->
    <nav>
        <a href="#"><i class="fa-solid fa-house"></i> Home</a>
        <a href="#">All India Govt. Jobs</a>
        <a href="#">Bank Jobs</a>
        <a href="#">Railway Jobs</a>
        <a href="#">Police / Defence Jobs</a>
    </nav>

    <div class="container">
        
        <!-- Left Side: Interactive Request Form -->
        <section class="form-section">
            <h2><i class="fa-brands fa-whatsapp"></i> घर बैठे फॉर्म भरवाएं (WhatsApp Form)</h2>
            <form id="whatsappForm">
                <div class="form-group">
                    <label for="name">आवेदक का नाम (Name):</label>
                    <input type="text" id="name" placeholder="अपना नाम लिखें" required>
                </div>
                <div class="form-group">
                    <label for="fname">पिता का नाम (Father's Name):</label>
                    <input type="text" id="fname" placeholder="पिता का नाम लिखें" required>
                </div>
                <div class="form-group">
                    <label for="dob">जन्मतिथि (Date of Birth):</label>
                    <input type="date" id="dob" required>
                </div>
                <div class="form-group">
                    <label for="category">कैटेगरी (Category):</label>
                    <select id="category" required>
                        <option value="">--चुनें--</option>
                        <option value="General">General</option>
                        <option value="OBC">OBC</option>
                        <option value="SC">SC</option>
                        <option value="ST">ST</option>
                        <option value="EWS">EWS</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="mobile">मोबाइल नंबर (Mobile No.):</label>
                    <input type="tel" id="mobile" placeholder="अपना मोबाइल नंबर" pattern="[0-9]{10}" required>
                </div>
                <div class="form-group">
                    <label for="work">क्या काम करवाना है? (Details):</label>
                    <textarea id="work" rows="3" placeholder="जैसे: RPF Constable का फॉर्म भरना है, नया पैन कार्ड बनाना है आदि..." required></textarea>
                </div>
                <button type="button" onclick="sendToWhatsApp()" class="submit-btn">
                    <i class="fa-brands fa-whatsapp"></i> जानकारी व्हाट्सएप पर भेजें
                </button>
            </form>
        </section>
